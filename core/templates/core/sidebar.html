{% load static %}
<div class="sidebar pe-4 pb-3">
    <nav class="navbar bg-secondary navbar-dark">
        <a href="{% url 'dashboard' %}" class="navbar-brand mx-4 mb-3">
            <h3 class="text-primary"><i class="fa fa-building me-2"></i>RentEase</h3>
        </a>
        <div class="d-flex align-items-center ms-4 mb-4">
            <div class="position-relative">
                <img class="rounded-circle" src="{% static 'core/img/user.jpg' %}" alt="" style="width: 40px; height: 40px;">
                <div class="bg-success rounded-circle border border-2 border-white position-absolute end-0 bottom-0 p-1"></div>
            </div>
            <div class="ms-3">
                <h6 class="mb-0">{{ user.get_full_name|default:user.username }}</h6>
                <span>Landlord</span>
            </div>
        </div>
        <div class="navbar-nav w-100">
            <a href="{% url 'dashboard' %}" class="nav-item nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="fa fa-tachometer-alt me-2"></i>Dashboard
            </a>
            <a href="{% url 'property_list' %}" class="nav-item nav-link {% if 'property' in request.resolver_match.url_name %}active{% endif %}">
                <i class="fa fa-home me-2"></i>Properties
            </a>
            <a href="{% url 'tenant_list' %}" class="nav-item nav-link {% if 'tenant' in request.resolver_match.url_name %}active{% endif %}">
                <i class="fa fa-users me-2"></i>Tenants
            </a>
            <a href="{% url 'lease_list' %}" class="nav-item nav-link {% if 'lease' in request.resolver_match.url_name %}active{% endif %}">
                <i class="fa fa-file-contract me-2"></i>Leases
            </a>
            <a href="{% url 'payment_list' %}" class="nav-item nav-link {% if 'payment' in request.resolver_match.url_name %}active{% endif %}">
                <i class="fa fa-money-bill-wave me-2"></i>Payments
            </a>
            <a href="{% url 'mpesa_list' %}" class="nav-item nav-link {% if 'mpesa' in request.resolver_match.url_name %}active{% endif %}">
                <i class="fa fa-mobile-alt me-2"></i>M-Pesa
            </a>
            <a href="{% url 'maintenance_list' %}" class="nav-item nav-link {% if 'maintenance' in request.resolver_match.url_name %}active{% endif %}">
                <i class="fa fa-tools me-2"></i>Maintenance
            </a>
            <a href="{% url 'reports' %}" class="nav-item nav-link {% if request.resolver_match.url_name == 'reports' %}active{% endif %}">
                <i class="fa fa-chart-bar me-2"></i>Reports
            </a>
            <a href="{% url 'profile' %}" class="nav-item nav-link {% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
                <i class="fa fa-user-cog me-2"></i>Profile
            </a>
            <a href="{% url 'logout' %}" class="nav-item nav-link">
                <i class="fa fa-sign-out-alt me-2"></i>Logout
            </a>
        </div>
    </nav>
</div>
