{% extends 'core/base.html' %}
{% block title %}Edit Maintenance{% endblock %}
{% block content %}
<div class="container-fluid pt-4 px-4">
    <div class="row g-4">
        <div class="col-sm-12 col-xl-8 mx-auto">
            <div class="bg-secondary rounded h-100 p-4">
                <h6 class="mb-4">Edit Maintenance Request: {{ item.title }}</h6>
                <form method="POST">
                    {% csrf_token %}
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Property</label>
                            <select class="form-select" name="property" required>
                                {% for p in properties %}
                                <option value="{{ p.pk }}" {% if item.property.pk == p.pk %}selected{% endif %}>{{ p.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tenant</label>
                            <select class="form-select" name="tenant">
                                <option value="">None</option>
                                {% for t in tenants %}
                                <option value="{{ t.pk }}" {% if item.tenant and item.tenant.pk == t.pk %}selected{% endif %}>{{ t.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" name="title" value="{{ item.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="4" required>{{ item.description }}</textarea>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Priority</label>
                            <select class="form-select" name="priority">
                                <option value="low" {% if item.priority == 'low' %}selected{% endif %}>Low</option>
                                <option value="medium" {% if item.priority == 'medium' %}selected{% endif %}>Medium</option>
                                <option value="high" {% if item.priority == 'high' %}selected{% endif %}>High</option>
                                <option value="urgent" {% if item.priority == 'urgent' %}selected{% endif %}>Urgent</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Status</label>
                            <select class="form-select" name="status">
                                <option value="open" {% if item.status == 'open' %}selected{% endif %}>Open</option>
                                <option value="in_progress" {% if item.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                                <option value="resolved" {% if item.status == 'resolved' %}selected{% endif %}>Resolved</option>
                                <option value="cancelled" {% if item.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Cost (KSh)</label>
                            <input type="number" class="form-control" name="cost" value="{{ item.cost|default:'' }}" step="0.01">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Vendor/Service Provider</label>
                        <input type="text" class="form-control" name="vendor" value="{{ item.vendor }}">
                    </div>
                    <button type="submit" class="btn btn-primary">Update Request</button>
                    <a href="{% url 'maintenance_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
